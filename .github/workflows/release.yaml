name: Release drafter

on: workflow_dispatch

permissions:
  contents: read

jobs:
  draft_release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: read_version
        run: |
          echo "version=$(cat version/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Print version
        run: |
          echo ${{ steps.read_version.outputs.version }}
      - uses: release-drafter/release-drafter@v6
        id: release
        with:
          version: ${{ steps.read_version.outputs.version }}
          name: v${{ steps.read_version.outputs.version }}
          tag: v${{ steps.read_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_and_publish:
    runs-on: ubuntu-latest
    needs: draft_release
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ needs.draft_release.outputs.tag_name }}
      CGO_ENABLED: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm   }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: mips,    extra: GOMIPS=softfloat }
          - { goos: linux,   goarch: mipsle,  extra: GOMIPS=softfloat }
          - { goos: windows, goarch: amd64,   ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Display Go version
        run: go version

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ${{ matrix.extra }} go build -trimpath -ldflags="-w -s" -o "spoofdpi${{ matrix.ext }}" .

      - name: Package
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ASSET="spoofdpi-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
            mv "spoofdpi${{ matrix.ext }}" "$ASSET"
          else
            ASSET="spoofdpi-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
            tar -zcvf "$ASSET" ./spoofdpi
            rm -f ./spoofdpi
          fi
          sha256sum "$ASSET" > "$ASSET.sha256"
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload
        run: |
          gh release upload "$TAG_NAME" "./$ASSET" "./$ASSET.sha256"
